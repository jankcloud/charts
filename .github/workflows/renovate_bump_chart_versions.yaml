name: Renovate Chart Version Bump

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - 'charts/**/values.yaml'

permissions:
  contents: write

jobs:
  bump-chart-versions:
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install yq
        uses: dcarbone/install-yq-action@v1

      - name: Sync appVersion and bump chart versions for changed values files
        shell: bash
        run: |
          set -euo pipefail

          bump_patch() {
            local version="$1"
            if [[ ! "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo ""
              return
            fi
            local major="${BASH_REMATCH[1]}"
            local minor="${BASH_REMATCH[2]}"
            local patch="${BASH_REMATCH[3]}"
            echo "${major}.${minor}.$((patch + 1))"
          }

          mapfile -t charts < <(
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- \
              'charts/*/values.yaml' \
            | sed -nE 's#^charts/([^/]+)/values\.ya?ml$#\1#p' \
            | sort -u
          )

          if [[ "${#charts[@]}" -eq 0 ]]; then
            echo "No changed chart values files found."
            exit 0
          fi

          for chart in "${charts[@]}"; do
            values_file="charts/${chart}/values.yaml"
            chart_file="charts/${chart}/Chart.yaml"

            if [[ ! -f "$values_file" || ! -f "$chart_file" ]]; then
              echo "Skipping ${chart}: missing values.yaml or Chart.yaml"
              continue
            fi

            current_tag="$(yq -r '.image.tag // ""' "$values_file")"
            current_tag="${current_tag//[[:space:]]/}"

            if [[ -z "$current_tag" || "$current_tag" == "null" ]]; then
              echo "Skipping ${chart}: top-level image.tag is not set"
              continue
            fi

            base_tag="$(git show "${{ github.event.pull_request.base.sha }}:${values_file}" 2>/dev/null | yq -r '.image.tag // ""' - 2>/dev/null || true)"
            if [[ "$current_tag" == "$base_tag" ]]; then
              echo "Skipping ${chart}: top-level image.tag unchanged from base"
              continue
            fi

            normalized_app_version="${current_tag#v}"
            normalized_app_version="${normalized_app_version%%@*}"

            base_version="$(git show "${{ github.event.pull_request.base.sha }}:${chart_file}" 2>/dev/null | yq -r '.version // ""' - 2>/dev/null || true)"
            target_version="$(bump_patch "$base_version")"
            if [[ -z "$target_version" ]]; then
              echo "Skipping ${chart}: base Chart.yaml version '${base_version}' is not semver x.y.z"
              continue
            fi

            current_app_version="$(yq -r '.appVersion // ""' "$chart_file")"
            current_chart_version="$(yq -r '.version // ""' "$chart_file")"

            if [[ "$current_app_version" == "$normalized_app_version" && "$current_chart_version" == "$target_version" ]]; then
              echo "Skipping ${chart}: Chart.yaml already synced"
              continue
            fi

            echo "Updating ${chart}: appVersion=${normalized_app_version}, version=${target_version}"
            yq -i ".appVersion = \"${normalized_app_version}\"" "$chart_file"
            yq -i ".version = \"${target_version}\"" "$chart_file"
          done

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(charts): sync appVersion and bump chart version(s)"
          file_pattern: charts/*/Chart.yaml
          commit_user_name: jankbot
          commit_user_email: jankbot@users.noreply.github.com
