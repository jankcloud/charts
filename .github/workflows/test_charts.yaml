name: Test Charts

on:
  pull_request:
    paths:
      - 'charts/**'
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chart-ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - chart: qui
            chart_path: charts/qui
            unit_tests_enabled: true
            linter_enabled: true
            check_conformance: true
          - chart: qbittorrent-exporter
            chart_path: charts/qbittorrent-exporter
            unit_tests_enabled: true
            linter_enabled: true
            check_conformance: true
          - chart: sonarr
            chart_path: charts/sonarr
            dependencies:
              fetch: true
              repositories:
                - name: jankcloud
                  url: https://jankcloud.github.io/charts
            unit_tests_enabled: true
            linter_enabled: true
            check_conformance: true
          - chart: radarr
            chart_path: charts/radarr
            dependencies:
              fetch: true
              repositories:
                - name: jankcloud
                  url: https://jankcloud.github.io/charts
            unit_tests_enabled: true
            linter_enabled: true
            check_conformance: true
          - chart: prowlarr
            chart_path: charts/prowlarr
            dependencies:
              fetch: true
              repositories:
                - name: jankcloud
                  url: https://jankcloud.github.io/charts
            unit_tests_enabled: true
            linter_enabled: true
            check_conformance: true
          - chart: lidarr
            chart_path: charts/lidarr
            dependencies:
              fetch: true
              repositories:
                - name: jankcloud
                  url: https://jankcloud.github.io/charts
            unit_tests_enabled: true
            linter_enabled: true
            check_conformance: true
          - chart: servarr-stack
            chart_path: charts/servarr-stack
            unit_tests_enabled: true
            linter_enabled: false
            check_conformance: true
            dependencies:
              fetch: true
              repositories:
                - name: jankcloud
                  url: https://jankcloud.github.io/charts
          - chart: arr-common
            chart_path: tests/arr-common
            unit_tests_enabled: true
            linter_enabled: true
            check_conformance: true
            dependencies:
              fetch: true
              repositories:
                - name: jankcloud
                  url: https://jankcloud.github.io/charts
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'

      - name: Install chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Install helm-unittest plugin
        if: matrix.unit_tests_enabled
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.0.3 --verify=false

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz -o kubeconform.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Set up Helm repositories
        if: ${{ matrix.dependencies && matrix.dependencies.repositories }}
        run: |
          echo '${{ toJson(matrix.dependencies.repositories) }}' | jq -c '.[]' | while read -r repo; do
            name=$(echo "$repo" | jq -r '.name')
            url=$(echo "$repo" | jq -r '.url')
            helm repo add "$name" "$url"
          done

      - name: Fetch Helm dependencies
        if: matrix.dependencies.fetch
        run: helm dependency build ${{ matrix.chart_path }}

      - name: Helm lint (strict)
        if: matrix.linter_enabled
        run: helm lint ${{ matrix.chart_path }} --strict

      - name: Helm unit tests
        if: matrix.unit_tests_enabled
        run: helm unittest ${{ matrix.chart_path }}

      - name: Render templates and validate schemas
        if: matrix.check_conformance
        run: |
          helm template ${{ matrix.chart }} ${{ matrix.chart_path }} > /tmp/${{ matrix.chart }}-rendered.yaml
          kubeconform -strict -summary -ignore-missing-schemas /tmp/${{ matrix.chart }}-rendered.yaml

      - name: chart-testing lint
        if: matrix.linter_enabled
        run: ct lint --config .ct.yaml --charts ${{ matrix.chart_path }}
