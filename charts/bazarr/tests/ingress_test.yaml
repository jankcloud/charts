suite: Ingress
templates:
  - templates/ingress.yaml
tests:

  - it: does not render an Ingress by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders an Ingress when enabled
    set:
      ingress:
        enabled: true
        hosts:
          - host: bazarr.example.com
            paths:
              - path: /
                pathType: Prefix
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Ingress
