suite: Service
templates:
  - templates/service.yaml
tests:

  - it: renders a Service for Bazarr
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-bazarr

  - it: exposes Bazarr on port 6767 named http
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 6767
            targetPort: http
            protocol: TCP
