# yaml-language-server: $schema=values.schema.json
image:
  repository: ghcr.io/cleanuparr/cleanuparr
  tag: 2.9.2@sha256:db36f03f3455e5b50ab5722c3f8ef05193374e92467adf98a49c86be420b8779
  pullPolicy: IfNotPresent

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

strategy:
  type: Recreate

env:
  PORT: "11011"
  TZ: "America/New_York"

service:
  type: ClusterIP
  port: 11011
  annotations: {}

persistence:
  config:
    enabled: false
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
    volumeName: ""

additionalVolumes: []
  # Mount an existing claim for the torrents/downloads directory:
  # - name: torrents
  #   mountPath: /data/torrents
  #   existingClaim: ""
  #   readOnly: false

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

probes:
  liveness:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5
  readiness:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  annotations: {}

metrics:
  enabled: false
  image:
    repository: ghcr.io/onedr0p/exportarr
    tag: v2.3.0@sha256:af535d94061cf97a52e1661945ffba78c03f9443eae7c0da1a80a5a4be56b520
    pullPolicy: IfNotPresent
  port: 9707
  env:
    URL: "http://localhost:11011"
    APIKEY: ""

gluetun:
  enabled: false
  image:
    repository: ghcr.io/qdm12/gluetun
    tag: latest
    pullPolicy: IfNotPresent
  env: {}
  existingSecret: ""

nodeSelector: {}
tolerations: []
affinity: {}

initContainers: []
sidecars: []
extraVolumes: []
extraVolumeMounts: []
