suite: Deployment
templates:
  - templates/deployment.yaml
tests:

  - it: renders a Deployment by default
    asserts:
      - isKind:
          of: Deployment
      - isAPIVersion:
          of: apps/v1

  - it: uses the release name as the resource name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-prowlarr

  - it: sets Prowlarr default runtime env vars
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PUID
            value: "1000"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PGID
            value: "1000"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TZ
            value: "America/New_York"

  - it: uses /ping for liveness and readiness probes
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /ping
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ping

  - it: does not render an exportarr sidecar by default
    asserts:
      - notContains:
          path: spec.template.spec.containers
          content:
            name: exportarr

  - it: renders an exportarr sidecar with APP=prowlarr when enabled
    set:
      exportarr:
        enabled: true
        env:
          URL: "http://localhost:9696"
          APIKEY: "test-api-key"
          APP: prowlarr
    asserts:
      - contains:
          path: spec.template.spec.containers
          content:
            name: exportarr
          any: true
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: APP
            value: prowlarr
