suite: Service
templates:
  - templates/service.yaml
tests:

  - it: renders a Service for Prowlarr
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-prowlarr

  - it: exposes Prowlarr on port 9696 named http
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 9696
            targetPort: http
            protocol: TCP
