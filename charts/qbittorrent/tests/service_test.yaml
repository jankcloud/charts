suite: Service
templates:
  - templates/service.yaml
tests:

  - it: renders a Service for qBittorrent
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-qbittorrent

  - it: exposes qBittorrent on port 8080 named http
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: http
            protocol: TCP
