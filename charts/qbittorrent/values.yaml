# yaml-language-server: $schema=values.schema.json
image:
  repository: ghcr.io/linuxserver/qbittorrent
  tag: 5.1.4@sha256:474ef1f1c63fc060236e85cd6ec4a3232aea5a0d7a033c6bab9911039933f147
  pullPolicy: IfNotPresent

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

strategy:
  type: Recreate

env:
  PUID: "1000"
  PGID: "1000"
  TZ: "America/New_York"

service:
  type: ClusterIP
  port: 8080
  annotations: {}

persistence:
  config:
    enabled: false
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 2Gi
    volumeName: ""

additionalVolumes: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

probes:
  liveness:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5
  readiness:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  annotations: {}

metrics:
  enabled: false
  image:
    repository: ghcr.io/martabal/qbittorrent-exporter
    tag: v1.13.4@sha256:b7360b87bcbe0982e1784a6e341d9cf00137795803eac4fe9f8dd9f813d72fb6
    pullPolicy: IfNotPresent
  port: 8090
  env:
    QBITTORRENT_BASE_URL: "http://localhost:8080"
    QBITTORRENT_USERNAME: ""
    QBITTORRENT_PASSWORD: ""
    EXPORTER_PORT: "8090"

gluetun:
  enabled: false
  image:
    repository: ghcr.io/qdm12/gluetun
    tag: latest
    pullPolicy: IfNotPresent
  env: {}
  existingSecret: ""

nodeSelector: {}
tolerations: []
affinity: {}

initContainers: []
sidecars: []
extraVolumes: []
extraVolumeMounts: []
