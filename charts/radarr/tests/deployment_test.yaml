suite: Deployment
templates:
  - templates/deployment.yaml
tests:

  - it: renders a Deployment by default
    asserts:
      - isKind:
          of: Deployment
      - isAPIVersion:
          of: apps/v1

  - it: uses the release name as the resource name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-radarr

  - it: uses the Radarr image configured by chart values
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/linuxserver/radarr:6.0.4

  - it: sets Radarr default runtime env vars
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PUID
            value: "1000"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PGID
            value: "1000"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TZ
            value: "America/New_York"

  - it: uses /ping for liveness and readiness probes
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /ping
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ping
