suite: ServiceMonitor
templates:
  - templates/servicemonitor.yaml
tests:

  - it: does not render a ServiceMonitor by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a ServiceMonitor when enabled
    set:
      serviceMonitor:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor

  - it: renders a metrics exporter endpoint when both ServiceMonitor and metrics exporter are enabled
    set:
      serviceMonitor:
        enabled: true
      metrics:
        enabled: true
    asserts:
      - contains:
          path: spec.endpoints
          content:
            port: metrics-exporter
            interval: 30s
            scrapeTimeout: 10s
