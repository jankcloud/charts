suite: Bazarr Deployment dependency
templates:
  - charts/bazarr/templates/deployment.yaml
tests:

  - it: renders Bazarr Deployment by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-bazarr

---

suite: Bazarr Service dependency
templates:
  - charts/bazarr/templates/service.yaml
tests:

  - it: renders Bazarr Service by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-bazarr
      - equal:
          path: spec.ports[0].port
          value: 6767
