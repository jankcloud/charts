suite: Cleanuparr Deployment dependency
templates:
  - charts/cleanuparr/templates/deployment.yaml
tests:

  - it: renders Cleanuparr Deployment by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cleanuparr

---

suite: Cleanuparr Service dependency
templates:
  - charts/cleanuparr/templates/service.yaml
tests:

  - it: renders Cleanuparr Service by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cleanuparr
      - equal:
          path: spec.ports[0].port
          value: 11011
