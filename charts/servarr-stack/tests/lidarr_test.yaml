suite: Lidarr Deployment dependency
templates:
  - charts/lidarr/templates/deployment.yaml
tests:

  - it: renders Lidarr Deployment by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-lidarr

---

suite: Lidarr Service dependency
templates:
  - charts/lidarr/templates/service.yaml
tests:

  - it: renders Lidarr Service by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-lidarr
      - equal:
          path: spec.ports[0].port
          value: 8686
