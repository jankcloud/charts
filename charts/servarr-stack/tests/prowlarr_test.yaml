suite: Prowlarr Deployment dependency
templates:
  - charts/prowlarr/templates/deployment.yaml
tests:

  - it: renders Prowlarr Deployment by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-prowlarr

---

suite: Prowlarr Service dependency
templates:
  - charts/prowlarr/templates/service.yaml
tests:

  - it: renders Prowlarr Service by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-prowlarr
      - equal:
          path: spec.ports[0].port
          value: 9696
