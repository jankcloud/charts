suite: Radarr Deployment dependency
templates:
  - charts/radarr/templates/deployment.yaml
tests:

  - it: renders Radarr Deployment by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-radarr

---

suite: Radarr Service dependency
templates:
  - charts/radarr/templates/service.yaml
tests:

  - it: renders Radarr Service by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-radarr
      - equal:
          path: spec.ports[0].port
          value: 7878
