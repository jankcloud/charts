suite: Sonarr Deployment dependency
templates:
  - charts/sonarr/templates/deployment.yaml
tests:

  - it: renders Sonarr Deployment by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sonarr

---

suite: Sonarr Service dependency
templates:
  - charts/sonarr/templates/service.yaml
tests:

  - it: renders Sonarr Service by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sonarr
      - equal:
          path: spec.ports[0].port
          value: 8989
