suite: PVC
templates:
  - templates/pvc.yaml
tests:

  - it: renders no PVCs when persistence is disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a config PVC when persistence.config is enabled
    set:
      persistence:
        config:
          enabled: true
          size: 4Gi
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sonarr-config
